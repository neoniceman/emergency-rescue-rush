<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#0b1020" />
<title>긴급출동 레이싱</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap" />
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; }
  html, body { width:100%; height:100%; overflow:hidden; background:#05070f; touch-action:none; overscroll-behavior:none;
    font-family:"Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", system-ui, sans-serif; }
  #stage { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:#05070f; }
  #game { display:block; touch-action:none; background:#0b1020; box-shadow:0 0 60px rgba(0,0,0,.6); }
  #boot { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px;
    background:#0b1020; color:#fff; z-index:50; transition:opacity .4s; }
  #boot.hide { opacity:0; pointer-events:none; }
  #boot .logo { font-family:"Black Han Sans", "Pretendard Variable", sans-serif; font-size:32px; letter-spacing:0; color:#ffd23f; text-shadow:0 2px 0 #c1121f, 0 0 24px rgba(255,82,82,.5); }
  #boot .bar { width:200px; height:8px; border-radius:8px; background:#1d2740; overflow:hidden; }
  #boot .bar i { display:block; height:100%; width:0%; background:linear-gradient(90deg,#ff5a5a,#ffd23f); transition:width .2s; }
  #boot .tip { font-size:12px; color:#7c87a8; }
</style>
</head>
<body>
  <div id="stage"><canvas id="game"></canvas></div>
  <div id="boot">
    <div class="logo">🚨 긴급출동 레이싱</div>
    <div class="bar"><i id="bootbar"></i></div>
    <div class="tip" id="boottip">출동 준비 중…</div>
  </div>
  <script src="./app.js"></script>
</body>
</html>
